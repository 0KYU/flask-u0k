{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 class="card-title">Ping 网络诊断</h2>
    <p style="color: #666; margin-bottom: 16px;">输入 IP 地址或域名进行网络连通性测试。</p>

    <form method="POST" action="/ping" class="login-form">
        <div class="form-group">
            <label for="ip">目标地址</label>
            <input type="text" id="ip" name="ip" placeholder="例如：127.0.0.1、localhost、8.8.8.8" value="{{ ping_ip or '' }}">
        </div>
        <button type="submit" class="btn btn-primary btn-block">Ping</button>
    </form>

    {% if ping_result %}
    <div style="margin-top: 24px;">
        <p style="margin-bottom: 8px; color: #666;">Ping 结果 — {{ ping_ip }}</p>
        <pre style="background: #1e1e1e; color: #00ff00; border: 1px solid #333; border-radius: 6px; padding: 16px; font-size: 14px; font-family: 'Consolas', 'Courier New', monospace; max-height: 500px; overflow: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.6;">{{ ping_result }}</pre>
    </div>
    {% endif %}

    {% if ping_error %}
    <div style="margin-top: 24px;">
        <p style="margin-bottom: 8px; color: #666;">错误信息 — {{ ping_ip }}</p>
        <pre style="background: #1e1e1e; color: #ff4444; border: 1px solid #333; border-radius: 6px; padding: 16px; font-size: 14px; font-family: 'Consolas', 'Courier New', monospace; max-height: 500px; overflow: auto; white-space: pre-wrap; word-break: break-all; line-height: 1.6;">{{ ping_error }}</pre>
    </div>
    {% endif %}
</div>
{% endblock %}
